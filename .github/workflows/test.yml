name: Test

on:
  push:
    branches-ignore:
      - main
    tags-ignore: ["*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Installing dependencies
        run: yarn

      - name: Testing
        run: npm run test
